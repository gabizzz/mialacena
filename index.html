<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 3 Sucursales Más Baratas y Alacena</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 700px;
            margin: 30px auto;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1 { margin-top: 0; color: #2c3e50; font-size: 24px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background-color: #2471a3; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        .status { margin-top: 10px; font-style: italic; color: #7f8c8d; }
        #resultado { margin-top: 20px; display: none; }
        
        .sucursal-item {
            background: #fff;
            border: 1px solid #ddd;
            border-left: 5px solid #27ae60;
            padding: 15px;
            margin-top: 12px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sucursal-item.carrefour {
            border-left-color: #00469b; 
        }
        .sucursal-info p { margin: 4px 0; }
        .badge-pos {
            background: #27ae60;
            color: white;
            padding: 3px 8px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 14px;
        }
        .sucursal-item.carrefour .badge-pos { background: #00469b; }
        .precio-tag { font-size: 20px; font-weight: bold; color: #2c3e50; }
        .error { color: #c0392b; background: #f9ebea; padding: 10px; border-radius: 4px; margin-top: 15px; }

        .btn-anadir {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            width: auto;
            margin-top: 5px;
            display: inline-block;
        }
        .btn-anadir:hover { background-color: #27ae60; }

        /* Estilos para la Alacena */
        .alacena-lista {
            list-style: none;
            padding: 0;
        }
        .alacena-item {
            background: #fdfefe;
            border: 1px solid #e2e8f0;
            padding: 10px 15px;
            margin-bottom: 8px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .btn-eliminar {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            width: auto;
            margin-left: 15px;
        }
        .btn-eliminar:hover { background-color: #c0392b; }

        /* Total de la Alacena */
        .alacena-total {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #bdc3c7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
        }

        .debug-panel {
            background: #2c3e50;
            color: #ecf0f1;
            font-family: monospace;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            max-height: 180px;
            overflow-y: auto;
            margin-top: 15px;
        }
        .log-line { margin: 3px 0; }
        .log-success { color: #2ecc71; }
        .log-error { color: #e74c3c; }
    </style>
</head>
<body>

<div class="card">
    <h1>Comparador: Top 3 Sucursales Más Baratas</h1>
    
    <div id="geoStatus" class="status">Obteniendo tu ubicación actual...</div>
    
    <div style="margin-top: 15px;">
        <label for="idProducto">Código de barras (EAN):</label>
        <input type="text" id="idProducto" value="7798033333907" placeholder="Ej: 7798033333907">
        <button id="btnBuscar" disabled>Buscar y Calcular Precios</button>
    </div>

    <div id="technical-debug-logs" class="debug-panel">Logs de red listos...</div>

    <div id="errorBox" class="error" style="display: none;"></div>

    <div id="resultado">
        <h3>Producto: <span id="prodNombre" style="color:#2980b9;">-</span></h3>
        <p><small>Resultados ordenados del más barato al más caro (Top 3)</small></p>
        <div id="listaSucursales"></div>
    </div>
</div>

<div class="card">
    <h2>Mi Alacena 🛒</h2>
    <ul id="listaAlacena" class="alacena-lista"></ul>
    <div class="alacena-total">
        <span>Monto Total:</span>
        <span id="montoTotalAlacena">$0,00</span>
    </div>
</div>

<script>
    let miLatitud = null;
    let miLongitud = null;
    let opcionesActuales = [];
    let productoActualNombre = "";

    // Cargar alacena inicial desde LocalStorage
    let alacena = JSON.parse(localStorage.getItem('miAlacena')) || [];

    const geoStatus = document.getElementById('geoStatus');
    const btnBuscar = document.getElementById('btnBuscar');
    const errorBox = document.getElementById('errorBox');
    const resultadoDiv = document.getElementById('resultado');
    const listaSucursales = document.getElementById('listaSucursales');
    const listaAlacena = document.getElementById('listaAlacena');
    const montoTotalAlacena = document.getElementById('montoTotalAlacena');
    const debugPanel = document.getElementById('technical-debug-logs');

    // Renderizar al cargar la página
    actualizarVistaAlacena();

    function logTecnico(mensaje, tipo = "info") {
        const p = document.createElement('p');
        p.className = `log-line log-${tipo}`;
        p.innerText = `[${new Date().toLocaleTimeString()}] ${mensaje}`;
        debugPanel.appendChild(p);
        debugPanel.scrollTop = debugPanel.scrollHeight;
    }

    async function fetchWithTimeout(resource, options = {}, timeout = 6000) {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        const response = await fetch(resource, { ...options, signal: controller.signal });
        clearTimeout(id);
        return response;
    }

    // 1. Geolocalización
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                miLatitud = position.coords.latitude;
                miLongitud = position.coords.longitude;
                geoStatus.innerHTML = `📍 Ubicación obtenida correctamente (${miLatitud.toFixed(4)}, ${miLongitud.toFixed(4)})`;
                geoStatus.style.color = '#27ae60';
                btnBuscar.disabled = false;
            },
            (error) => {
                geoStatus.innerHTML = "⚠️ Ubicación no otorgada. Usando ubicación por defecto (Zárate).";
                geoStatus.style.color = '#d35400';
                miLatitud = -34.0981; 
                miLongitud = -59.0286;
                btnBuscar.disabled = false;
            }
        );
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) {
        if (!lat1 || !lon1 || !lat2 || !lon2) return null;
        const R = 6371; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a))); 
    }

    // Petición genérica multi-proxy para evitar bloqueos de CORS
    async function fetchViaProxies(targetUrl, nombreApi) {
        // Canal 1: CORSProxy.io
        try {
            logTecnico(`[${nombreApi}] Intentando Canal 1 (CORSProxy.io)...`);
            const response = await fetchWithTimeout(`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`);
            if (response.ok) {
                const text = await response.text();
                if (!text.trim().startsWith("<") && !text.toLowerCase().includes("cloudflare")) {
                    return JSON.parse(text);
                }
            }
        } catch (e) { logTecnico(`[${nombreApi}] Canal 1 falló.`, "error"); }

        // Canal 2: AllOrigins RAW
        try {
            logTecnico(`[${nombreApi}] Intentando Canal 2 (AllOrigins)...`);
            const response = await fetchWithTimeout(`https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`);
            if (response.ok) {
                const text = await response.text();
                if (!text.trim().startsWith("<") && !text.toLowerCase().includes("cloudflare")) {
                    return JSON.parse(text);
                }
            }
        } catch (e) { logTecnico(`[${nombreApi}] Canal 2 falló.`, "error"); }

        // Canal 3: Codetabs
        try {
            logTecnico(`[${nombreApi}] Intentando Canal 3 (Codetabs)...`);
            const response = await fetchWithTimeout(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`);
            if (response.ok) {
                const text = await response.text();
                if (!text.trim().startsWith("<") && !text.toLowerCase().includes("cloudflare")) {
                    return JSON.parse(text);
                }
            }
        } catch (e) { logTecnico(`[${nombreApi}] Canal 3 falló.`, "error"); }

        throw new Error(`No se pudo conectar con la API de ${nombreApi} mediante ningún proxy.`);
    }

    function seleccionarYAgregar(index) {
        const opcionSeleccionada = opcionesActuales[index];
        if (!opcionSeleccionada) return;

        const itemAlacena = {
            id: Date.now(), 
            producto: productoActualNombre,
            sucursal: opcionSeleccionada.nombre,
            direccion: opcionSeleccionada.direccion,
            precio: opcionSeleccionada.precio
        };
        
        alacena.push(itemAlacena);
        localStorage.setItem('miAlacena', JSON.stringify(alacena));
        actualizarVistaAlacena();
    }

    function eliminarDeAlacena(id) {
        alacena = alacena.filter(item => item.id !== id);
        localStorage.setItem('miAlacena', JSON.stringify(alacena));
        actualizarVistaAlacena();
    }

    function actualizarVistaAlacena() {
        listaAlacena.innerHTML = "";
        let totalAcumulado = 0;

        alacena.forEach(item => {
            totalAcumulado += item.precio;
            const li = document.createElement('li');
            li.className = "alacena-item";
            li.innerHTML = `
                <div>
                    <strong>${item.producto}</strong><br>
                    <span style="font-size: 12px; color: #555;">📍 Lg: ${item.sucursal} (${item.direccion})</span>
                </div>
                <div style="display: flex; align-items: center;">
                    <div class="precio-tag" style="font-size: 16px;">$${item.precio.toLocaleString('es-AR', {minimumFractionDigits: 2})}</div>
                    <button class="btn-eliminar" onclick="eliminarDeAlacena(${item.id})">✖</button>
                </div>
            `;
            listaAlacena.appendChild(li);
        });

        montoTotalAlacena.innerText = `$${totalAcumulado.toLocaleString('es-AR', {minimumFractionDigits: 2})}`;
    }

    function procesarRespuestaVtex(data) {
        if (!data) return null;
        try {
            let products = data.products || (Array.isArray(data) ? data : []);
            if (products.length === 0) return null;

            const prod = products[0];
            const brand = prod.brand || "";
            const prodName = prod.productName || "Desconocido";
            const completeName = brand ? `${brand} - ${prodName}` : prodName;

            let spotPrice = null;
            if (prod.priceRange?.sellingPrice) spotPrice = prod.priceRange.sellingPrice.lowPrice;

            if ((spotPrice === null || spotPrice === undefined || spotPrice === 0) && prod.items?.[0]?.sellers?.[0]) {
                const offer = prod.items[0].sellers[0].commertialOffer;
                if (offer) spotPrice = offer.spotPrice || offer.Price || null;
            }

            if (spotPrice !== null && spotPrice !== undefined && spotPrice > 0) {
                return { name: completeName, price: parseFloat(spotPrice) };
            }
            return null;
        } catch (err) { return null; }
    }

    btnBuscar.addEventListener('click', async () => {
        const ean = document.getElementById('idProducto').value.trim();
        if (!ean) return alert("Ingresa un código de barras.");

        listaSucursales.innerHTML = "";
        errorBox.style.display = 'none';
        btnBuscar.innerText = "Buscando en múltiples servidores...";
        btnBuscar.disabled = true;
        debugPanel.innerHTML = "";

        opcionesActuales = [];
        productoActualNombre = "Producto";

        const radioBusqueda = 30000; 
        const urlPreciosClaros = `https://d3e6htiiul5ek9.cloudfront.net/prod/productos?id_producto=${ean}&lat=${miLatitud}&lng=${miLongitud}&radio=${radioBusqueda}&limit=30`;
        const urlCarrefour = `https://www.carrefour.com.ar/api/io/_v/api/intelligent-search/product_search?query=${ean}&postalCode=2800&_nocache=${Date.now()}`;

        try {
            const [resPrecios, resCarrefourRaw] = await Promise.allSettled([
                fetchViaProxies(urlPreciosClaros, "Precios Claros"),
                fetchViaProxies(urlCarrefour, "Carrefour")
            ]);

            // Parsear Precios Claros (Con direcciones y distancias reales de sucursal)
            if (resPrecios.status === "fulfilled" && resPrecios.value) {
                const data = resPrecios.value;
                if (data.producto?.nombre) productoActualNombre = data.producto.nombre;
                
                if (data.sucursales && data.sucursales.length > 0) {
                    data.sucursales.forEach(suc => {
                        if (!suc.message && suc.preciosProducto) {
                            const precio = suc.preciosProducto.precioLista || suc.preciosProducto.precio_unitario_con_iva;
                            
                            // Extraer coordenadas nativas de la sucursal para calcular la distancia en tiempo real
                            const latSuc = parseFloat(suc.lat);
                            const lngSuc = parseFloat(suc.lng);
                            const dist = calcularDistancia(miLatitud, miLongitud, latSuc, lngSuc);
                            
                            if (precio && parseFloat(precio) > 0) {
                                opcionesActuales.push({
                                    cadena: "PreciosClaros",
                                    nombre: `${suc.banderaDescripcion} (${suc.sucursalNombre})`,
                                    direccion: suc.direccion || "Dirección no especificada",
                                    distancia: dist,
                                    precio: parseFloat(precio)
                                });
                            }
                        }
                    });
                    logTecnico("Precios Claros parseado correctamente.", "success");
                }
            }

            // Parsear Carrefour
            if (resCarrefourRaw.status === "fulfilled" && resCarrefourRaw.value) {
                const itemProcesado = procesarRespuestaVtex(resCarrefourRaw.value);
                if (itemProcesado) {
                    if (productoActualNombre === "Producto") productoActualNombre = itemProcesado.name;
                    opcionesActuales.push({
                        cadena: "Carrefour",
                        nombre: `Carrefour E-Commerce`,
                        direccion: "Tienda Digital / Envío a domicilio",
                        distancia: null, 
                        precio: itemProcesado.price
                    });
                    logTecnico("Carrefour Digital parseado correctamente.", "success");
                }
            }

            // Filtrar y ordenar
            opcionesActuales.sort((a, b) => a.precio - b.precio);
            const top3 = opcionesActuales.slice(0, 3);

            if (top3.length > 0) {
                document.getElementById('prodNombre').innerText = productoActualNombre;
                
                top3.forEach((suc, index) => {
                    const esCarrefour = suc.cadena === "Carrefour" ? "carrefour" : "";
                    const distTexto = suc.distancia ? `${suc.distancia.toFixed(2)} KM` : "Envío Digital / N/A";
                    
                    const htmlCard = `
                        <div class="sucursal-item ${esCarrefour}">
                            <div class="sucursal-info">
                                <p><span class="badge-pos">#${index + 1}</span> <strong>${suc.nombre}</strong></p>
                                <p><small>📍 Dirección: ${suc.direccion}</small></p>
                                <p><small>🚗 Distancia a tu posición: ${distTexto}</small></p>
                                <button class="btn-anadir" onclick="seleccionarYAgregar(${index})">➕ Elegir esta opción</button>
                            </div>
                            <div class="precio-tag">$${suc.precio.toLocaleString('es-AR', {minimumFractionDigits: 2})}</div>
                        </div>
                    `;
                    listaSucursales.innerHTML += htmlCard;
                });

                resultadoDiv.style.display = 'block';
            } else {
                throw new Error("No se encontraron sucursales físicas ni digitales con ofertas de precios legibles.");
            }

        } catch (err) {
            errorBox.innerText = err.message;
            errorBox.style.display = 'block';
            resultadoDiv.style.display = 'none';
        } finally {
            btnBuscar.innerText = "Buscar y Calcular Precios";
            btnBuscar.disabled = false;
        }
    });
</script>

</body>
</html>
