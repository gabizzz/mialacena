<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Productos por EAN - Coto</title>
    <!-- Estilo moderno mediante Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .search-container { max-width: 600px; margin: 50px auto; padding: 30px; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .product-card { max-width: 600px; margin: 20px auto; display: none; }
        .loader { display: none; margin: 20px auto; text-align: center; }
        .price-badge { font-size: 1.25rem; font-weight: bold; color: #e20025; }
        .old-price { text-decoration: line-through; color: #6c757d; font-size: 0.95rem; }
    </style>
</head>
<body>

<div class="container">
    <!-- Formulario de Entrada de datos -->
    <div class="search-container text-center">
        <h2 class="mb-4 text-primary">Consulta de Código EAN</h2>
        <p class="text-muted small">Ingresá el código de barras numérico del artículo para forzar la consulta en el backend de Coto.</p>
        
        <form id="eanForm" class="input-group mb-3">
            <input type="text" id="eanInput" class="form-control form-control-lg" placeholder="Ej: 7790990003190" required pattern="[0-9]{8,14}" title="Ingresá un código numérico válido de entre 8 y 14 dígitos">
            <button class="btn btn-primary btn-lg" type="submit">Buscar</button>
        </form>
        
        <div id="errorMessage" class="text-danger small fw-bold"></div>
    </div>

    <!-- Indicador de Espera / Loader -->
    <div id="loader" class="loader">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
        <p class="mt-2 text-muted">Autenticando sesión y buscando producto...</p>
    </div>

    <!-- Tarjeta Visual de Resultados -->
    <div id="productCard" class="card product-card shadow-sm border-0 rounded-4 overflow-hidden">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
                <span id="prodMarca" class="badge bg-secondary text-uppercase">Marca</span>
                <span class="text-muted small">EAN: <strong id="prodEan">--</strong></span>
            </div>
            <h4 id="prodNombre" class="card-title fw-bold mb-3 text-dark">Nombre del Producto</h4>
            
            <div class="bg-light p-3 rounded-3 mb-3">
                <div id="contPrecioLista" class="mb-1">
                    <span class="text-muted small">Precio de Lista:</span> 
                    <span id="prodPrecioLista" class="fw-medium">$--</span>
                </div>
                <div id="contPrecioPromo" class="mb-1" style="display:none;">
                    <span class="text-muted small">Precio Promo/Efectivo:</span> 
                    <span id="prodPrecioPromo" class="price-badge">$--</span>
                </div>
                <div id="prodDescuento" class="badge bg-danger mt-2" style="display:none;">--</div>
            </div>
            
            <div class="d-grid">
                <a id="prodLink" href="#" target="_blank" class="btn btn-outline-primary btn-sm">Ver artículo en la tienda oficial</a>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('eanForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const ean = document.getElementById('eanInput').value.trim();
    const loader = document.getElementById('loader');
    const card = document.getElementById('productCard');
    const errorDiv = document.getElementById('errorMessage');
    
    errorDiv.innerText = '';
    card.style.display = 'none';
    loader.style.display = 'block';

    // Servidor proxy intermedio para evitar problemas estrictos de CORS en cliente local
    const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
    const targetUrl = `https://www.cotodigital3.com.ar/sitios/cd/browse?Ntt=${ean}`;

    try {
        const respuesta = await fetch(proxyUrl + targetUrl, {
            method: 'GET',
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
                // Simulamos cabeceras de un navegador legítimo de escritorio
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8',
                'Accept-Language': 'es-419,es;q=0.9,en;q=0.8',
                // Inyectamos de forma limpia tu Session ID provisto bajo la estructura nativa del servidor JSESSIONID
                'Cookie': 'JSESSIONID=5wTgxejPfkPHqtPcaRh1vminrN-4joW2lSzN2-CgBBJM_yAyNGnE!-1702645427'
            }
        });

        if (!respuesta.ok) {
            if(respuesta.status === 403) {
                throw new Error("Error 403: Coto denegó el acceso. El Session ID provisto puede haber expirado o requiere revalidación en el navegador de origen.");
            }
            throw new Error(`Error en la consulta del servidor externo (Status: ${respuesta.status})`);
        }

        const htmlTexto = await respuesta.text();
        
        // Conversión a DOM virtual en caliente para procesar clases de maquetación de componentes Angular
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlTexto, 'text/html');

        const tarjetaHtml = doc.querySelector('.card-container');

        if (!tarjetaHtml) {
            throw new Error("No se encontraron productos asociados a ese código EAN, o el Session ID introducido ha perdido la zona asignada.");
        }

        // Extracción directa de las clases del DOM moderno
        const nombre = tarjetaHtml.querySelector('.nombre-producto')?.textContent.trim() || "Producto Sin Nombre";
        const contenedorPrecios = tarjetaHtml.querySelector('.centro-precios');
        
        let precioTachado = contenedorPrecios?.querySelector('.contado')?.textContent.trim() || "";
        let precioPrincipal = contenedorPrecios?.querySelector('.precio-main h3')?.textContent.trim() || "";
        let descuento = contenedorPrecios?.querySelector('.descuento')?.textContent.trim() || "";

        const limpiar = (txt) => txt.replace(/[^0-9.,$]/g, '').trim();

        // Mapeo e inyección de datos dentro de los componentes visuales de la interfaz
        document.getElementById('prodNombre').innerText = nombre;
        document.getElementById('prodEan').innerText = ean;
        document.getElementById('prodMarca').innerText = nombre.split(' ')[0]; 
        document.getElementById('prodLink').href = targetUrl;

        if (precioTachado) {
            document.getElementById('prodPrecioLista').innerText = limpiar(precioTachado);
            document.getElementById('prodPrecioLista').className = "old-price";
            
            document.getElementById('prodPrecioPromo').innerText = limpiar(precioPrincipal);
            document.getElementById('contPrecioPromo').style.display = 'block';
            
            if(descuento) {
                document.getElementById('prodDescuento').innerText = descuento;
                document.getElementById('prodDescuento').style.display = 'inline-block';
            }
        } else {
            document.getElementById('prodPrecioLista').innerText = limpiar(precioPrincipal);
            document.getElementById('prodPrecioLista').className = "price-badge text-dark";
            document.getElementById('contPrecioPromo').style.display = 'none';
            document.getElementById('prodDescuento').style.display = 'none';
        }

        card.style.display = 'block';

    } catch (error) {
        errorDiv.innerText = error.message;
        console.error("Detalles técnicos del error detectado:", error);
    } finally {
        loader.style.display = 'none';
    }
});
</script>

</body>
</html>
