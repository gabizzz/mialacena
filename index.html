<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 3 Sucursales Más Baratas y Alacena</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 700px;
            margin: 30px auto;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1 { margin-top: 0; color: #2c3e50; font-size: 24px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background-color: #2471a3; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        .status { margin-top: 10px; font-style: italic; color: #7f8c8d; }
        #resultado { margin-top: 20px; display: none; }
        
        .sucursal-item {
            background: #fff;
            border: 1px solid #ddd;
            border-left: 5px solid #27ae60;
            padding: 15px;
            margin-top: 12px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sucursal-item.carrefour {
            border-left-color: #00469b; 
        }
        .sucursal-info p { margin: 4px 0; }
        .badge-pos {
            background: #27ae60;
            color: white;
            padding: 3px 8px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 14px;
        }
        .sucursal-item.carrefour .badge-pos { background: #00469b; }
        .precio-tag { font-size: 20px; font-weight: bold; color: #2c3e50; }
        .error { color: #c0392b; background: #f9ebea; padding: 10px; border-radius: 4px; margin-top: 15px; }

        /* Estilos para la Alacena */
        .alacena-lista {
            list-style: none;
            padding: 0;
        }
        .alacena-item {
            background: #fdfefe;
            border: 1px solid #e2e8f0;
            padding: 10px 15px;
            margin-bottom: 8px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .alacena-item span { font-size: 14px; }

        /* Logs técnicos de depuración */
        .debug-panel {
            background: #2c3e50;
            color: #ecf0f1;
            font-family: monospace;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            max-height: 180px;
            overflow-y: auto;
            margin-top: 15px;
        }
        .log-line { margin: 3px 0; }
        .log-success { color: #2ecc71; }
        .log-error { color: #e74c3c; }
    </style>
</head>
<body>

<div class="card">
    <h1>Comparador: Top 3 Sucursales Más Baratas</h1>
    
    <div id="geoStatus" class="status">Obteniendo tu ubicación actual...</div>
    
    <div style="margin-top: 15px;">
        <label for="idProducto">Código de barras (EAN):</label>
        <input type="text" id="idProducto" value="7798033333907" placeholder="Ej: 7798033333907">
        <button id="btnBuscar" disabled>Buscar y Calcular Precios</button>
    </div>

    <div id="technical-debug-logs" class="debug-panel">Logs de red listos...</div>

    <div id="errorBox" class="error" style="display: none;"></div>

    <div id="resultado">
        <h3>Producto: <span id="prodNombre" style="color:#2980b9;">-</span></h3>
        <p><small>Resultados ordenados del más barato al más caro (Top 3)</small></p>
        <div id="listaSucursales"></div>
    </div>
</div>

<div class="card">
    <h2>Mi Alacena 🛒</h2>
    <ul id="listaAlacena" class="alacena-lista"></ul>
</div>

<script>
    let miLatitud = null;
    let miLongitud = null;
    let alacena = [];

    const geoStatus = document.getElementById('geoStatus');
    const btnBuscar = document.getElementById('btnBuscar');
    const errorBox = document.getElementById('errorBox');
    const resultadoDiv = document.getElementById('resultado');
    const listaSucursales = document.getElementById('listaSucursales');
    const listaAlacena = document.getElementById('listaAlacena');
    const debugPanel = document.getElementById('technical-debug-logs');

    // Auxiliar: Logger técnico en pantalla
    function logTecnico(mensaje, tipo = "info") {
        const p = document.createElement('p');
        p.className = `log-line log-${tipo}`;
        p.innerText = `[${new Date().toLocaleTimeString()}] ${mensaje}`;
        debugPanel.appendChild(p);
        debugPanel.scrollTop = debugPanel.scrollHeight;
    }

    // Auxiliar: Fetch con Timeout para evitar congelamientos si un proxy cae
    async function fetchWithTimeout(resource, options = {}, timeout = 5000) {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        const response = await fetch(resource, { ...options, signal: controller.signal });
        clearTimeout(id);
        return response;
    }

    // 1. Geolocalización
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                miLatitud = position.coords.latitude;
                miLongitud = position.coords.longitude;
                geoStatus.innerHTML = `📍 Ubicación obtenida correctamente (${miLatitud.toFixed(4)}, ${miLongitud.toFixed(4)})`;
                geoStatus.style.color = '#27ae60';
                btnBuscar.disabled = false;
            },
            (error) => {
                geoStatus.innerHTML = "⚠️ Ubicación no otorgada. Usando ubicación por defecto (Zárate).";
                geoStatus.style.color = '#d35400';
                miLatitud = -34.0981; 
                miLongitud = -59.0286;
                btnBuscar.disabled = false;
            }
        );
    }

    // 2. Distancia Haversine
    function calcularDistancia(lat1, lon1, lat2, lon2) {
        if (!lat1 || !lon1 || !lat2 || !lon2) return null;
        const R = 6371; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a))); 
    }

    // Alacena Logic
    function agregarAAlacena(nombreProducto, opcionMasBarata) {
        const itemAlacena = {
            producto: nombreProducto,
            sucursal: opcionMasBarata.nombre,
            precio: opcionMasBarata.precio
        };
        alacena.push(itemAlacena);
        actualizarVistaAlacena();
    }

    function actualizarVistaAlacena() {
        listaAlacena.innerHTML = "";
        alacena.forEach(item => {
            const li = document.createElement('li');
            li.className = "alacena-item";
            li.innerHTML = `
                <div>
                    <strong>${item.producto}</strong><br>
                    <span>Lugar: ${item.sucursal}</span>
                </div>
                <div class="precio-tag" style="font-size: 16px;">$${item.precio.toLocaleString('es-AR', {minimumFractionDigits: 2})}</div>
            `;
            listaAlacena.appendChild(li);
        });
    }

    // FUNCIONES APORTADAS POR EL USUARIO (Optimizadas con la estructura actual)
    async function fetchProductFromCarrefour(ean, postalCode = "2800") {
        const timestamp = Date.now();
        const targetUrl = `https://www.carrefour.com.ar/api/io/_v/api/intelligent-search/product_search?query=${ean}&postalCode=${postalCode}&_nocache=${timestamp}`;
        
        debugPanel.innerHTML = ""; 
        logTecnico(`URL objetivo: ${targetUrl}`);

        // CANAL 1: CORSProxy.io
        try {
            const proxyUrl1 = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
            logTecnico("Intentando Canal 1 (CORSProxy.io)...");
            const response = await fetchWithTimeout(proxyUrl1, {}, 5000);
            if (response.ok) {
                const textData = await response.text();
                if (textData.trim().startsWith("<") || textData.toLowerCase().includes("cloudflare") || textData.toLowerCase().includes("captcha")) {
                    throw new Error("Bloqueo de seguridad (Cloudflare) detectado.");
                }
                const jsonData = JSON.parse(textData);
                logTecnico("Canal 1 exitoso y recibido.", "success");
                return jsonData;
            } else {
                throw new Error(`HTTP ${response.status}`);
            }
        } catch (err) {
            logTecnico(`Canal 1 fallido: ${err.message}`, "error");
        }

        // CANAL 2: AllOrigins RAW
        try {
            const proxyUrl2 = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;
            logTecnico("Intentando Canal 2 (AllOrigins RAW)...");
            const response = await fetchWithTimeout(proxyUrl2, {}, 6000);
            if (response.ok) {
                const textData = await response.text();
                if (textData.trim().startsWith("<") || textData.toLowerCase().includes("cloudflare") || textData.toLowerCase().includes("captcha")) {
                    throw new Error("Bloqueo de seguridad Carrefour.");
                }
                const jsonData = JSON.parse(textData);
                logTecnico("Canal 2 exitoso.", "success");
                return jsonData;
            } else {
                throw new Error(`HTTP ${response.status}`);
            }
        } catch (err) {
            logTecnico(`Canal 2 fallido: ${err.message}`, "error");
        }

        // CANAL 3: Codetabs
        try {
            const proxyUrl3 = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`;
            logTecnico("Intentando Canal 3 (Codetabs)...");
            const response = await fetchWithTimeout(proxyUrl3, {}, 6000);
            if (response.ok) {
                const textData = await response.text();
                if (textData.trim().startsWith("<") || textData.toLowerCase().includes("cloudflare") || textData.toLowerCase().includes("captcha")) {
                    throw new Error("Bloqueo de seguridad Carrefour.");
                }
                const jsonData = JSON.parse(textData);
                logTecnico("Canal 3 exitoso.", "success");
                return jsonData;
            } else {
                throw new Error(`HTTP ${response.status}`);
            }
        } catch (err) {
            logTecnico(`Canal 3 fallido: ${err.message}`, "error");
        }

        throw new Error("Todos los canales de red proxy alternativos fallaron.");
    }

    function procesarRespuestaVtex(data) {
        if (!data) return null;
        try {
            let products = Array.isArray(data) ? data : (data.products || []);
            if (products.length === 0) {
                logTecnico("API sin coincidencias o sin stock para esta zona.", "error");
                return null;
            }

            const prod = products[0];
            const brand = prod.brand || "";
            const prodName = prod.productName || "Desconocido";
            const completeName = brand ? `${brand} - ${prodName}` : prodName;

            let spotPrice = null;

            if (prod.priceRange && prod.priceRange.sellingPrice) {
                spotPrice = prod.priceRange.sellingPrice.lowPrice;
                logTecnico(`Precio detectado en priceRange: $${spotPrice}`);
            }

            if ((spotPrice === null || spotPrice === undefined) && prod.items && prod.items[0] && prod.items[0].sellers && prod.items[0].sellers[0]) {
                const seller = prod.items[0].sellers[0];
                if (seller.commertialOffer) {
                    const offer = seller.commertialOffer;
                    if (offer.spotPrice !== undefined && offer.spotPrice !== null) {
                        spotPrice = offer.spotPrice;
                    } else if (offer.Price !== undefined && offer.Price !== null) {
                        spotPrice = offer.Price;
                    }
                }
            }

            if (spotPrice !== null && spotPrice !== undefined) {
                return {
                    name: completeName,
                    price: parseFloat(spotPrice)
                };
            }
            
            return null;
        } catch (err) {
            logTecnico(`Error al analizar datos internos: ${err.message}`, "error");
            return null;
        }
    }

    // 3. Request Principal Integrado
    btnBuscar.addEventListener('click', async () => {
        const ean = document.getElementById('idProducto').value.trim();
        if (!ean) return alert("Ingresa un código de barras.");

        listaSucursales.innerHTML = "";
        errorBox.style.display = 'none';
        btnBuscar.innerText = "Consultando APIs...";
        btnBuscar.disabled = true;

        let todasLasOpciones = [];
        let nombreProductoDetectado = "Producto";

        // En lugar de usar la lista fija 'sucursalesPublicas', usamos tu latitud y longitud dinámicas
        // Definimos un radio en metros (ej: 5000 metros = 5 KM a la redonda)
        const radioBusqueda = 30000; 
        const urlPreciosClaros = `https://d3e6htiiul5ek9.cloudfront.net/prod/productos?id_producto=${ean}&lat=${miLatitud}&lng=${miLongitud}&radio=${radioBusqueda}&limit=30`;
        try {
            // Ejecutamos ambas consultas en paralelo usando tu nueva función multi-proxy para Carrefour
            const [resPrecios, resCarrefourRaw] = await Promise.allSettled([
                fetch(urlPreciosClaros).then(r => r.json()),
                fetchProductFromCarrefour(ean)
            ]);

            // Parsear Precios Claros
            if (resPrecios.status === "fulfilled" && resPrecios.value && resPrecios.value.sucursales) {
                const data = resPrecios.value;
                if (data.producto && data.producto.nombre) nombreProductoDetectado = data.producto.nombre;
                
                data.sucursales.forEach(suc => {
                    if (!suc.message && suc.preciosProducto) {
                        const precio = suc.preciosProducto.precioLista || suc.preciosProducto.precio_unitario_con_iva;
                        const dist = calcularDistancia(miLatitud, miLongitud, parseFloat(suc.lat), parseFloat(suc.lng));
                        if (precio) {
                            todasLasOpciones.push({
                                cadena: "PreciosClaros",
                                nombre: `${suc.banderaDescripcion} (${suc.sucursalNombre})`,
                                direccion: suc.direccion || "Dirección no disponible",
                                distancia: dist,
                                precio: parseFloat(precio)
                            });
                        }
                    }
                });
            }

            // Parsear Carrefour usando tu función procesadora modular
            if (resCarrefourRaw.status === "fulfilled" && resCarrefourRaw.value) {
                const itemProcesado = procesarRespuestaVtex(resCarrefourRaw.value);
                if (itemProcesado) {
                    // Si Precios Claros falló o devolvió nombre genérico, adoptamos el de Carrefour
                    if (nombreProductoDetectado === "Producto") nombreProductoDetectado = itemProcesado.name;

                    todasLasOpciones.push({
                        cadena: "Carrefour",
                        nombre: `Carrefour Digital`,
                        direccion: "Precio de referencia tienda online",
                        distancia: null, 
                        precio: itemProcesado.price
                    });
                }
            }

            // Ordenar de Menor a Mayor Precio absoluto
            todasLasOpciones.sort((a, b) => a.precio - b.precio);
            const top3 = todasLasOpciones.slice(0, 3);

            if (top3.length > 0) {
                document.getElementById('prodNombre').innerText = nombreProductoDetectado;
                
                top3.forEach((suc, index) => {
                    const esCarrefour = suc.cadena === "Carrefour" ? "carrefour" : "";
                    const distTexto = suc.distancia ? `${suc.distancia.toFixed(2)} KM` : "N/A";
                    
                    const htmlCard = `
                        <div class="sucursal-item ${esCarrefour}">
                            <div class="sucursal-info">
                                <p><span class="badge-pos">#${index + 1}</span> <strong>${suc.nombre}</strong></p>
                                <p><small>📍 ${suc.direccion}</small></p>
                                <p><small>🚗 Distancia: ${distTexto}</small></p>
                            </div>
                            <div class="precio-tag">$${suc.precio.toLocaleString('es-AR', {minimumFractionDigits: 2})}</div>
                        </div>
                    `;
                    listaSucursales.innerHTML += htmlCard;
                });

                resultadoDiv.style.display = 'block';

                // SELECCIÓN AUTOMÁTICA: Guardamos en la alacena de forma garantizada el menor del ordenamiento
                const opcionMasBarata = todasLasOpciones[0];
                agregarAAlacena(nombreProductoDetectado, opcionMasBarata);

            } else {
                throw new Error("No se obtuvieron registros de precios en ninguna plataforma.");
            }

        } catch (err) {
            errorBox.innerText = err.message;
            errorBox.style.display = 'block';
            resultadoDiv.style.display = 'none';
        } finally {
            btnBuscar.innerText = "Buscar y Calcular Precios";
            btnBuscar.disabled = false;
        }
    });
</script>

</body>
</html>
