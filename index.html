<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Precios: Coto vs Carrefour</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --coto-color: #e53e3e;
            --carrefour-color: #2b6cb0;
            --bg-winner: #f0fff4;
            --border-winner: #38a169;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f7fafc;
            margin: 0;
            padding: 20px;
            color: #2d3748;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1, h2 {
            text-align: center;
            margin-top: 0;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="number"] {
            flex: 1;
            padding: 12px;
            border: 2px border #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        input[type="number"]:focus {
            border-color: #cbcff0;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active {
            transform: scale(0.97);
        }
        .btn-search { background-color: #4a5568; color: white; }
        .btn-cam { background-color: #3182ce; color: white; }
        .btn-add { background-color: #38a169; color: white; width: 100%; margin-top: 15px; padding: 14px; font-size: 15px;}
        .btn-clear { background-color: #e53e3e; color: white; padding: 6px 12px; font-size: 12px; }
        .btn-del { background: none; border: none; cursor: pointer; font-size: 16px; }

        #reader-container {
            display: none;
            margin-bottom: 20px;
            border: 2px dashed #cbd5e0;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        #loader {
            display: none;
            text-align: center;
            font-weight: bold;
            color: #4a5568;
            margin: 20px 0;
        }

        .product-header {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #edf2f7;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .product-header img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            background: white;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }
        .product-info h3 { margin: 0 0 5px 0; font-size: 16px; }
        .product-info p { margin: 0; color: #718096; font-size: 14px; }

        .cards-grid {
            display: grid;
            grid-cols: 1fr 1fr;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .card {
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            position: relative;
            background: #fff;
        }
        .card.coto-border { border-top: 6px solid var(--coto-color); }
        .card.carrefour-border { border-top: 6px solid var(--carrefour-color); }
        
        .card.winner {
            background-color: var(--bg-winner);
            border-color: var(--border-winner);
        }
        .card.winner::after {
            content: "🏆 El más barato";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--border-winner);
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        .market-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .coto-color { color: var(--coto-color); }
        .carrefour-color { color: var(--carrefour-color); }
        
        .price-main { font-size: 24px; font-weight: 900; margin: 10px 0; }
        .price-old { font-size: 13px; color: #a0aec0; text-decoration: line-through; height: 18px; }
        
        .badge-container { height: 25px; margin-bottom: 5px; }
        .discount-badge {
            background-color: #feebc8;
            color: #c05621;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        .error-local { color: #a0aec0; font-size: 14px; font-style: italic; }

        /* Estilos Tabla de Lista de Compras */
        .list-section { margin-top: 35px; border-top: 2px solid #e2e8f0; pt: 20px; padding-top: 20px;}
        .list-header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f7fafc; color: #4a5568; }
        .total-box { text-align: right; font-size: 18px; font-weight: bold; margin-top: 15px; color: #2d3748; }
    </style>
</head>
<body>

<div class="container">
    <h1>SpotPrice Comparador</h1>
    
    <div class="search-box">
        <input type="number" id="eanInput" placeholder="Escaneá o escribí el código EAN" inputmode="numeric">
        <button class="btn-cam" id="btn-camara" onclick="toggleCamara()">📷 Cámara</button>
        <button class="btn-search" onclick="buscarPrecios()">Buscar</button>
    </div>

    <div id="reader-container">
        <div id="reader" style="width: 100%;"></div>
    </div>

    <div id="loader">🔄 Buscando en las góndolas digitales...</div>

    <div id="comparison-zone" style="display: none;">
        <div class="product-header">
            <img id="prod-img" src="" alt="Producto">
            <div class="product-info">
                <h3 id="prod-title">Nombre del Producto</h3>
                <p id="prod-brand">Marca</p>
            </div>
        </div>

        <div class="cards-grid">
            <div class="card coto-border" id="card-coto">
                <div class="market-title coto-color">Coto Digital</div>
                <div class="badge-container" id="coto-badge-container"></div>
                <div class="price-old" id="coto-old"></div>
                <div class="price-main" id="coto-price">$0.00</div>
            </div>

            <div class="card carrefour-border" id="card-carrefour">
                <div class="market-title carrefour-color">Carrefour</div>
                <div class="badge-container" id="carrefour-badge-container"></div>
                <div class="price-old" id="carrefour-old"></div>
                <div class="price-main" id="carrefour-price">$0.00</div>
            </div>
        </div>

        <button class="btn-add" onclick="agregarALista()">➕ Agregar el más barato a mi lista</button>
    </div>

    <div class="list-section">
        <div class="list-header-box">
            <h2>🛒 Mi Lista de Ahorro</h2>
            <button class="btn-clear" onclick="vaciarLista()">Vaciar Lista</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Sucursal</th>
                    <th>Precio</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="list-body">
                </tbody>
        </table>
        <div class="total-box">
            Total Estimado: <span id="list-total">$0.00</span>
        </div>
    </div>
</div>

<script>
    let html5QrcodeScanner = null;
    let prodaGuardar = null; 
    let listaCompras = JSON.parse(localStorage.getItem('lista_compras')) || [];

    // Renderizar la lista al iniciar la página por si hay elementos guardados
    renderLista();

    // --- MANEJO DE CÁMARA (html5-qrcode) ---
    function toggleCamara() {
        const container = document.getElementById('reader-container');
        const btn = document.getElementById('btn-camara');
        if (html5QrcodeScanner) { detenerCamara(); return; }

        container.style.display = 'block';
        btn.innerText = "❌ Cerrar";
        btn.style.backgroundColor = "#718096";

        html5QrcodeScanner = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 260, height: 160 } };

        html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess, onScanFailure)
        .catch(err => {
            alert("No se pudo iniciar la cámara. Asegurate de estar usando localhost o una conexión segura HTTPS.");
            detenerCamara();
        });
    }

    function detenerCamara() {
        const container = document.getElementById('reader-container');
        const btn = document.getElementById('btn-camara');
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => {
                html5QrcodeScanner = null;
                container.style.display = 'none';
                btn.innerText = "📷 Cámara";
                btn.style.backgroundColor = "#3182ce";
            }).catch(err => console.error(err));
        }
    }

    function onScanSuccess(decodedText) {
        detenerCamara();
        document.getElementById('eanInput').value = decodedText;
        buscarPrecios();
    }

    function onScanFailure(error) {}

    // --- CONSULTA SIMULTÁNEA DE APIS (Sin Proxy / Libre de CORS) ---
    async function buscarPrecios() {
        const ean = document.getElementById('eanInput').value.trim();
        if (!ean) { alert("Por favor, ingresá un código de barras."); return; }

        // Limpieza de UI previa
        document.getElementById('comparison-zone').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        
        document.getElementById('card-coto').classList.remove('winner');
        document.getElementById('card-carrefour').classList.remove('winner');
        document.getElementById('coto-badge-container').innerHTML = '';
        document.getElementById('carrefour-badge-container').innerHTML = '';
        document.getElementById('coto-old').innerText = '';
        document.getElementById('carrefour-old').innerText = '';

        // Endpoint Coto (Constructor.io - Público sin políticas restrictivas de origen)
        const urlCoto = `https://ac.cnstrc.com/autocomplete/${ean}?c=cio-ui-autocomplete-1.29.3&key=key_r6xzz4IAoTWcipni&num_results_Products=1`;
        
        // Endpoint Carrefour Tradicional indexado (Evita el bloqueo estricto de la API inteligente)
        const urlCarrefour = `https://www.carrefour.com.ar/api/catalog_system/pub/products/search?fq=alternateIds_Ean:${ean}`;

        let datosCoto = null;
        let datosCarrefour = null;

        // Ejecución en paralelo
        await Promise.all([
            fetch(urlCoto).then(r => r.json()).then(j => datosCoto = j).catch(e => console.log("Error Coto:", e)),
            fetch(urlCarrefour).then(r => r.json()).then(j => datosCarrefour = j).catch(e => console.log("Error Carrefour:", e))
        ]);

        document.getElementById('loader').style.display = 'none';

        let finalTitle = "Producto Desconocido";
        let finalBrand = "Genérico";
        let finalImg = "https://via.placeholder.com/120";

        let precioCotoFinal = null;
        let precioCarrefourFinal = null;

        // 1. Mapeo e Inyección de Coto
        const prodCoto = datosCoto?.sections?.Products?.[0];
        if (prodCoto) {
            const data = prodCoto.data;
            finalTitle = data.sku_display_name || prodCoto.value;
            finalBrand = data.product_brand || "Genérico";
            finalImg = data.image_url || finalImg;

            let precioLista = data.product_list_price;
            if (data.price && data.price.length > 0) precioLista = data.price[0].listPrice;

            if (data.discounts && data.discounts.length > 0) {
                const promo = data.discounts[0];
                if (promo.discountText) {
                    document.getElementById('coto-badge-container').innerHTML = `<span class="discount-badge">${promo.discountText}</span>`;
                }
                document.getElementById('coto-old').innerText = `Antes: $${precioLista}`;
                precioCotoFinal = parseFloat(String(promo.discountPrice).replace(/[^0-9.-]+/g,""));
            } else {
                precioCotoFinal = parseFloat(precioLista);
            }
            document.getElementById('coto-price').innerText = `$${precioCotoFinal.toFixed(2)}`;
        } else {
            document.getElementById('coto-price').innerHTML = `<span class="error-local">No encontrado</span>`;
        }

        // 2. Mapeo e Inyección de Carrefour
        const prodCarrefour = datosCarrefour?.[0];
        if (prodCarrefour) {
            // Si Coto no lo encontró, tomamos los datos base desde Carrefour
            if (finalTitle === "Producto Desconocido") {
                finalTitle = prodCarrefour.productName;
                finalBrand = prodCarrefour.brand || "Genérico";
                finalImg = prodCarrefour.items?.[0]?.images?.[0]?.imageUrl || finalImg;
            }

            const sItem = prodCarrefour.items?.[0]?.sellers?.[0]?.commertialRecord;
            if (sItem) {
                let precioLista = sItem.ListPrice;
                let precioSpot = sItem.Price;

                if (precioLista > precioSpot) {
                    let dtoPorcentaje = Math.round(((precioLista - precioSpot) / precioLista) * 100);
                    document.getElementById('carrefour-badge-container').innerHTML = `<span class="discount-badge">${dtoPorcentaje}% DTO</span>`;
                    document.getElementById('carrefour-old').innerText = `Antes: $${precioLista}`;
                }
                precioCarrefourFinal = parseFloat(precioSpot);
                document.getElementById('carrefour-price').innerText = `$${precioCarrefourFinal.toFixed(2)}`;
            } else {
                document.getElementById('carrefour-price').innerHTML = `<span class="error-local">Sin stock</span>`;
            }
        } else {
            document.getElementById('carrefour-price').innerHTML = `<span class="error-local">No encontrado</span>`;
        }

        // Romper si no está en ninguno
        if (!prodCoto && !prodCarrefour) {
            alert("El producto no se encuentra disponible en las bases de datos de Coto ni Carrefour.");
            return;
        }

        // Mostrar datos generales en el Card superior
        document.getElementById('prod-title').innerText = finalTitle;
        document.getElementById('prod-brand').innerText = finalBrand;
        document.getElementById('prod-img').src = finalImg;

        // Comparativa para fijar ganador comercial
        let mejorLugar = "";
        let mejorPrecio = 0;

        if (precioCotoFinal && precioCarrefourFinal) {
            if (precioCotoFinal <= precioCarrefourFinal) {
                document.getElementById('card-coto').classList.add('winner');
                mejorLugar = "Coto";
                mejorPrecio = precioCotoFinal;
            } else {
                document.getElementById('card-carrefour').classList.add('winner');
                mejorLugar = "Carrefour";
                mejorPrecio = precioCarrefourFinal;
            }
        } else if (precioCotoFinal) {
            document.getElementById('card-coto').classList.add('winner');
            mejorLugar = "Coto";
            mejorPrecio = precioCotoFinal;
        } else if (precioCarrefourFinal) {
            document.getElementById('card-carrefour').classList.add('winner');
            mejorLugar = "Carrefour";
            mejorPrecio = precioCarrefourFinal;
        }

        // Guardado temporal estructurado para la lista
        prodaGuardar = {
            titulo: finalTitle,
            lugar: mejorLugar,
            precio: mejorPrecio
        };

        document.getElementById('comparison-zone').style.display = 'block';
    }

    // --- CONTROL DE LA LISTA DE COMPRAS PERSISTENTE ---
    function agregarALista() {
        if (!prodaGuardar) return;
        listaCompras.push(prodaGuardar);
        localStorage.setItem('lista_compras', JSON.stringify(listaCompras));
        renderLista();
        
        // Reset manual de la caja de texto para escaneos continuos rápidos
        document.getElementById('eanInput').value = "";
        document.getElementById('comparison-zone').style.display = 'none';
    }

    function eliminarDeLista(index) {
        listaCompras.splice(index, 1);
        localStorage.setItem('lista_compras', JSON.stringify(listaCompras));
        renderLista();
    }

    function vaciarLista() {
        if (listaCompras.length === 0) return;
        if (confirm("¿Querés vaciar todos los elementos de la lista actual?")) {
            listaCompras = [];
            localStorage.removeItem('lista_compras');
            renderLista();
        }
    }

    function renderLista() {
        const tbody = document.getElementById('list-body');
        tbody.innerHTML = '';
        let total = 0;

        if (listaCompras.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#a0aec0; font-style:italic;">La lista está vacía.</td></tr>`;
            document.getElementById('list-total').innerText = `$0.00`;
            return;
        }

        listaCompras.forEach((item, index) => {
            total += item.precio;
            const claseColor = item.lugar === "Coto" ? "coto-color" : "carrefour-color";
            tbody.innerHTML += `
                <tr>
                    <td><strong>${item.titulo}</strong></td>
                    <td><span class="${claseColor}" style="font-weight:bold;">${item.lugar}</span></td>
                    <td>$${item.precio.toFixed(2)}</td>
                    <td><button class="btn-del" onclick="eliminarDeLista(${index})">🗑️</button></td>
                </tr>
            `;
        });

        document.getElementById('list-total').innerText = `$${total.toFixed(2)}`;
    }
</script>

</body>
</html>
