<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 3 Sucursales Más Baratas y Alacena</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 700px;
            margin: 30px auto;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1 { margin-top: 0; color: #2c3e50; font-size: 24px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background-color: #2471a3; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        .status { margin-top: 10px; font-style: italic; color: #7f8c8d; }
        #resultado { margin-top: 20px; display: none; }
        
        .sucursal-item {
            background: #fff;
            border: 1px solid #ddd;
            border-left: 5px solid #27ae60;
            padding: 15px;
            margin-top: 12px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sucursal-item.carrefour {
            border-left-color: #00469b; 
        }
        .sucursal-info p { margin: 4px 0; }
        .badge-pos {
            background: #27ae60;
            color: white;
            padding: 3px 8px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 14px;
        }
        .sucursal-item.carrefour .badge-pos { background: #00469b; }
        .precio-tag { font-size: 20px; font-weight: bold; color: #2c3e50; }
        .error { color: #c0392b; background: #f9ebea; padding: 10px; border-radius: 4px; margin-top: 15px; }

        /* Estilos nuevos para la Alacena */
        .alacena-lista {
            list-style: none;
            padding: 0;
        }
        .alacena-item {
            background: #fdfefe;
            border: 1px solid #e2e8f0;
            padding: 10px 15px;
            margin-bottom: 8px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .alacena-item span { font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Comparador: Top 3 Sucursales Más Baratas</h1>
    
    <div id="geoStatus" class="status">Obteniendo tu ubicación actual...</div>
    
    <div style="margin-top: 15px;">
        <label for="idProducto">Código de barras (EAN):</label>
        <input type="text" id="idProducto" value="7798033333907" placeholder="Ej: 7798033333907">
        <button id="btnBuscar" disabled>Buscar y Calcular Precios</button>
    </div>

    <div id="errorBox" class="error" style="display: none;"></div>

    <div id="resultado">
        <h3>Producto: <span id="prodNombre" style="color:#2980b9;">-</span></h3>
        <p><small>Resultados ordenados del más barato al más caro (Top 3)</small></p>
        <div id="listaSucursales"></div>
    </div>
</div>

<div class="card">
    <h2>My Alacena 🛒</h2>
    <ul id="listaAlacena" class="alacena-lista">
        </ul>
</div>

<script>
    let miLatitud = null;
    let miLongitud = null;

    // Array global para almacenar los productos de tu alacena
    let alacena = [];

    const geoStatus = document.getElementById('geoStatus');
    const btnBuscar = document.getElementById('btnBuscar');
    const errorBox = document.getElementById('errorBox');
    const resultadoDiv = document.getElementById('resultado');
    const listaSucursales = document.getElementById('listaSucursales');
    const listaAlacena = document.getElementById('listaAlacena');

    // 1. Geolocalización
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                miLatitud = position.coords.latitude;
                miLongitud = position.coords.longitude;
                geoStatus.innerHTML = `📍 Ubicación obtenida correctamente (${miLatitud.toFixed(4)}, ${miLongitud.toFixed(4)})`;
                geoStatus.style.color = '#27ae60';
                btnBuscar.disabled = false;
            },
            (error) => {
                geoStatus.innerHTML = "⚠️ Ubicación no otorgada. Usando ubicación por defecto.";
                geoStatus.style.color = '#d35400';
                miLatitud = -34.0981; 
                miLongitud = -59.0286;
                btnBuscar.disabled = false;
            }
        );
    }

    // 2. Distancia Haversine
    function calcularDistancia(lat1, lon1, lat2, lon2) {
        if (!lat1 || !lon1 || !lat2 || !lon2) return null;
        const R = 6371; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a))); 
    }

    // NUEVA FUNCIÓN: Agrega el producto a la alacena y actualiza el HTML
    function agregarAAlacena(nombreProducto, opcionMasBarata) {
        const itemAlacena = {
            producto: nombreProducto,
            sucursal: opcionMasBarata.nombre,
            precio: opcionMasBarata.precio
        };

        alacena.push(itemAlacena);
        actualizarVistaAlacena();
    }

    // NUEVA FUNCIÓN: Renderiza los elementos actuales de la alacena
    function actualizarVistaAlacena() {
        listaAlacena.innerHTML = "";
        alacena.forEach(item => {
            const li = document.createElement('li');
            li.className = "alacena-item";
            li.innerHTML = `
                <div>
                    <strong>${item.producto}</strong><br>
                    <span>Lugar: ${item.sucursal}</span>
                </div>
                <div class="precio-tag" style="font-size: 16px;">$${item.precio.toLocaleString('es-AR', {minimumFractionDigits: 2})}</div>
            `;
            listaAlacena.appendChild(li);
        });
    }

    // 3. Request
    btnBuscar.addEventListener('click', async () => {
        const ean = document.getElementById('idProducto').value.trim();
        if (!ean) return alert("Ingresa un código de barras.");

        listaSucursales.innerHTML = "";
        errorBox.style.display = 'none';
        btnBuscar.innerText = "Consultando APIs...";
        btnBuscar.disabled = true;

        let todasLasOpciones = [];
        let nombreProductoDetectado = "Producto";

        const sucursalesPublicas = "23-1-6292,15-1-216,23-1-6213,23-1-6201,12-1-117,15-1-233,23-1-6293,23-1-6209,15-1-5590,64-1-3,23-1-6203,15-1-5601,15-1-194,12-1-154,15-1-1036,9-3-5214,15-1-137,15-1-187,9-3-5211,61-1-23,15-1-283,11-5-1087,23-1-6208,12-1-155,3-1-1291,15-1-179,15-1-116,23-1-6204,64-1-19,9-3-662";
        const urlPreciosClaros = `https://d3e6htiiul5ek9.cloudfront.net/prod/producto?limit=10&id_producto=${ean}&array_sucursales=${sucursalesPublicas}`;
        //const urlCarrefour = `https://www.carrefour.com.ar/api/io/_v/api/intelligent-search/product_search?query=${ean}`;
// Modificación de la URL para saltar CORS y buscar exactamente por campo EAN
const urlCarrefour = `https://cors-anywhere.herokuapp.com/https://www.carrefour.com.ar/api/io/_v/api/intelligent-search/product_search?q=sku.ean:${ean}`;
        try {
            const [resPrecios, resCarrefour] = await Promise.allSettled([
                fetch(urlPreciosClaros).then(r => r.json()),
                fetch(urlCarrefour).then(r => r.json())
            ]);

            // Parsear Precios Claros
            if (resPrecios.status === "fulfilled" && resPrecios.value.sucursales) {
                const data = resPrecios.value;
                if (data.producto && data.producto.nombre) nombreProductoDetectado = data.producto.nombre;
                
                data.sucursales.forEach(suc => {
                    if (!suc.message && suc.preciosProducto) {
                        const precio = suc.preciosProducto.precioLista || suc.preciosProducto.precio_unitario_con_iva;
                        const dist = calcularDistancia(miLatitud, miLongitud, parseFloat(suc.lat), parseFloat(suc.lng));
                        if (precio) {
                            todasLasOpciones.push({
                                cadena: "PreciosClaros",
                                nombre: `${suc.banderaDescripcion} (${suc.sucursalNombre})`,
                                direccion: suc.direccion || "Dirección no disponible",
                                distancia: dist,
                                precio: parseFloat(precio)
                            });
                        }
                    }
                });
            }

            // Parsear Carrefour buscando el "spotPrice" exacto
            if (resCarrefour.status === "fulfilled" && resCarrefour.value.products && resCarrefour.value.products.length > 0) {
                const prodCarrefour = resCarrefour.value.products[0];
                if (nombreProductoDetectado === "Producto") nombreProductoDetectado = prodCarrefour.productName;

                const item = prodCarrefour.items?.[0];
                const seller = item?.sellers?.[0];
                const precioC4 = seller?.commertialOffer?.spotPrice;

                if (precioC4) {
                    todasLasOpciones.push({
                        cadena: "Carrefour",
                        nombre: `Carrefour (${prodCarrefour.brand || 'Digital'})`,
                        direccion: "Precio de referencia de tienda digital",
                        distancia: null, 
                        precio: parseFloat(precioC4)
                    });
                }
            }

            // Ordenar por precio (Menor a Mayor)
            todasLasOpciones.sort((a, b) => a.precio - b.precio);
            
            // Filtramos el Top 3
            const top3 = todasLasOpciones.slice(0, 3);

            if (top3.length > 0) {
                document.getElementById('prodNombre').innerText = nombreProductoDetectado;
                
                top3.forEach((suc, index) => {
                    const esCarrefour = suc.cadena === "Carrefour" ? "carrefour" : "";
                    const distTexto = suc.distancia ? `${suc.distancia.toFixed(2)} KM` : "N/A";
                    
                    const htmlCard = `
                        <div class="sucursal-item ${esCarrefour}">
                            <div class="sucursal-info">
                                <p><span class="badge-pos">#${index + 1}</span> <strong>${suc.nombre}</strong></p>
                                <p><small>📍 ${suc.direccion}</small></p>
                                <p><small>🚗 Distancia: ${distTexto}</small></p>
                            </div>
                            <div class="precio-tag">$${suc.precio.toLocaleString('es-AR', {minimumFractionDigits: 2})}</div>
                        </div>
                    `;
                    listaSucursales.innerHTML += htmlCard;
                });

                resultadoDiv.style.display = 'block';

                // CAMBIO PRINCIPAL: Como 'todasLasOpciones' ya está ordenado de menor a mayor,
                // la posición [0] contiene de forma garantizada la opción más barata.
                const opcionMasBarata = todasLasOpciones[0];
                agregarAAlacena(nombreProductoDetectado, opcionMasBarata);

            } else {
                throw new Error("No se encontraron precios disponibles para este producto.");
            }

        } catch (err) {
            errorBox.innerText = err.message;
            errorBox.style.display = 'block';
            resultadoDiv.style.display = 'none';
        } finally {
            btnBuscar.innerText = "Buscar y Calcular Precios";
            btnBuscar.disabled = false;
        }
    });
</script>

</body>
</html>
